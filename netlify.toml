[build]
  command = "npm run build"
  publish = "dist"

# Permanent redirect: old /private-tutor-mentor page merged into homepage
[[redirects]]
  from = "/private-tutor-mentor"
  to = "/"
  status = 301
  force = true

# Redirect www.rachaelpage.com → rachaelpage.com (canonical)
[[redirects]]
  from = "https://www.rachaelpage.com/*"
  to = "https://rachaelpage.com/:splat"
  status = 301
  force = true

# Serve static assets directly on rachaelpage.com (must come BEFORE the catch-all below)
# Without these, force=true on the catch-all rewrites /_astro/*.css → 404 → unstyled page
[[redirects]]
  from = "https://rachaelpage.com/_astro/*"
  to = "/_astro/:splat"
  status = 200

[[redirects]]
  from = "https://rachaelpage.com/styles/*"
  to = "/styles/:splat"
  status = 200

[[redirects]]
  from = "https://rachaelpage.com/images/*"
  to = "/images/:splat"
  status = 200

[[redirects]]
  from = "https://rachaelpage.com/admin/*"
  to = "/admin/:splat"
  status = 200

# Paths that exist at the site root and are linked from rachaelpage.com pages.
# Must come BEFORE the catch-all below, otherwise they'd be rewritten to /rachael-page/...
[[redirects]]
  from = "https://rachaelpage.com/design-resources/*"
  to = "/design-resources/:splat"
  status = 200

[[redirects]]
  from = "https://rachaelpage.com/meeting"
  to = "/meeting"
  status = 200

# Internal links use /rachael-page/... paths (correct for artfuly.com).
# On rachaelpage.com, strip the prefix so the URL stays clean.
[[redirects]]
  from = "https://rachaelpage.com/rachael-page/*"
  to = "https://rachaelpage.com/:splat"
  status = 301
  force = true

# Rewrite: rachaelpage.com/* → serves /rachael-page/* content
# URL stays as rachaelpage.com in the browser (status 200 = rewrite, not redirect)
[[redirects]]
  from = "https://rachaelpage.com/*"
  to = "/rachael-page/:splat"
  status = 200
  force = true
