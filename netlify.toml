[build]
  command = "npm run build"
  publish = "dist"

# Old Webflow artfuly.com work category slugs that changed — must come before catch-all
[[redirects]]
  from = "/work/motion-design-animation"
  to = "/rachael-page/work/motion-design"
  status = 301

[[redirects]]
  from = "/work/responsive-websites"
  to = "/rachael-page/work/ux-design"
  status = 301

[[redirects]]
  from = "/work/surface-pattern-design"
  to = "/rachael-page/work/graphic-design"
  status = 301

# Old Webflow artfuly.com /work/* paths → new /rachael-page/work/* locations
[[redirects]]
  from = "/work/*"
  to = "/rachael-page/work/:splat"
  status = 301

# Old Webflow artfuly.com /project/* paths → new /rachael-page/project/* locations
[[redirects]]
  from = "/project/*"
  to = "/rachael-page/project/:splat"
  status = 301

# Permanent redirect: old /private-tutor-mentor page merged into homepage
[[redirects]]
  from = "/private-tutor-mentor"
  to = "/"
  status = 301
  force = true

# Redirect www.artfuly.com → artfuly.com (canonical)
[[redirects]]
  from = "https://www.artfuly.com/*"
  to = "https://artfuly.com/:splat"
  status = 301
  force = true

# Redirect www.rachaelpage.com → rachaelpage.com (canonical)
[[redirects]]
  from = "https://www.rachaelpage.com/*"
  to = "https://rachaelpage.com/:splat"
  status = 301
  force = true

# Serve static assets directly on rachaelpage.com (must come BEFORE the catch-all below)
# Without these, force=true on the catch-all rewrites /_astro/*.css → 404 → unstyled page
[[redirects]]
  from = "https://rachaelpage.com/_astro/*"
  to = "/_astro/:splat"
  status = 200

[[redirects]]
  from = "https://rachaelpage.com/styles/*"
  to = "/styles/:splat"
  status = 200

[[redirects]]
  from = "https://rachaelpage.com/images/*"
  to = "/images/:splat"
  status = 200

[[redirects]]
  from = "https://rachaelpage.com/admin/*"
  to = "/admin/:splat"
  status = 200

# Favicons — pass through before the catch-all. rachaelpage.com uses its own "RP" mark.
[[redirects]]
  from = "https://rachaelpage.com/favicon.ico"
  to = "/favicon-rp.png"
  status = 200

[[redirects]]
  from = "https://rachaelpage.com/favicon-rp.svg"
  to = "/favicon-rp.svg"
  status = 200

[[redirects]]
  from = "https://rachaelpage.com/favicon-rp.png"
  to = "/favicon-rp.png"
  status = 200

[[redirects]]
  from = "https://rachaelpage.com/apple-touch-icon-rp.png"
  to = "/apple-touch-icon-rp.png"
  status = 200

# rachaelpage.com is canonical for /rachael-page/* content — needs its own
# robots.txt and sitemap.xml, carved out before the catch-all below.
[[redirects]]
  from = "https://rachaelpage.com/robots.txt"
  to = "/robots-rachaelpage.txt"
  status = 200

[[redirects]]
  from = "https://rachaelpage.com/sitemap.xml"
  to = "/rachaelpage-sitemap.xml"
  status = 200

# Paths that exist at the site root and are linked from rachaelpage.com pages.
# Must come BEFORE the catch-all below, otherwise they'd be rewritten to /rachael-page/...
[[redirects]]
  from = "https://rachaelpage.com/design-resources/*"
  to = "/design-resources/:splat"
  status = 200

[[redirects]]
  from = "https://rachaelpage.com/meeting"
  to = "/meeting"
  status = 200

# Internal links use /rachael-page/... paths (correct for artfuly.com).
# On rachaelpage.com, serve these directly to avoid double-prefixing.
# (Must be status 200, not 301 — a 301 here bounces against the catch-all
# rewrite below and creates an infinite redirect loop with every /work/* and
# /project/* page on rachaelpage.com.)
[[redirects]]
  from = "https://rachaelpage.com/rachael-page/*"
  to = "/rachael-page/:splat"
  status = 200
  force = true

# Rewrite: rachaelpage.com/* → serves /rachael-page/* content
# URL stays as rachaelpage.com in the browser (status 200 = rewrite, not redirect)
[[redirects]]
  from = "https://rachaelpage.com/*"
  to = "/rachael-page/:splat"
  status = 200
  force = true
